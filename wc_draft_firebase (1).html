<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>World Cup Draft</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0e14;--panel:#121823;--panel2:#1a2230;--line:#243044;--txt:#e8edf4;--dim:#8a99ad;
 --accent:#00d68f;--accent2:#ffd23f;--gk:#ff8a3d;--def:#3da5ff;--mid:#00d68f;--fwd:#ff5d73;--red:#ff5d73}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--txt);font-family:'Barlow',sans-serif;font-size:15px;overflow-x:hidden}
.wrap{max-width:760px;margin:0 auto;padding-bottom:80px}
header{background:linear-gradient(135deg,#0d1420,#161f30);border-bottom:1px solid var(--line);padding:14px 16px;position:sticky;top:0;z-index:50}
.title{font-family:'Bebas Neue';font-size:30px;letter-spacing:1.5px;line-height:1}
.title span{color:var(--accent)}
.sub{color:var(--dim);font-size:12px;margin-top:2px;font-weight:600;letter-spacing:.5px;text-transform:uppercase}
.onclock{margin-top:10px;background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:10px 12px;display:flex;align-items:center;justify-content:space-between}
.onclock .lbl{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:1px;font-weight:700}
.onclock .who{font-family:'Bebas Neue';font-size:24px;letter-spacing:1px}
.onclock .pick{font-size:12px;color:var(--accent2);font-weight:700}
.onclock.mine{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent),0 0 18px rgba(0,214,143,.25)}
.onclock.mine .who{color:var(--accent)}
.timer{font-family:'Bebas Neue';font-size:30px;letter-spacing:1px;min-width:54px;text-align:center}
.timer.warn{color:var(--accent2)}.timer.danger{color:var(--red);animation:pulse 1s infinite}
@keyframes pulse{50%{opacity:.4}}
.tabs{display:flex;background:var(--panel);position:sticky;top:0;z-index:40;border-bottom:1px solid var(--line)}
.tab{flex:1;text-align:center;padding:13px 4px;font-weight:700;font-size:12px;letter-spacing:.5px;text-transform:uppercase;color:var(--dim);cursor:pointer;border-bottom:2px solid transparent}
.tab.active{color:var(--txt);border-bottom-color:var(--accent)}
.toolbar{padding:10px 12px;display:flex;gap:8px;flex-wrap:wrap}
.search{flex:1;min-width:140px;background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:10px 12px;color:var(--txt);font-size:15px;font-family:inherit}
.search:focus{outline:none;border-color:var(--accent)}
.filters{display:flex;gap:6px;overflow-x:auto;padding:0 12px 8px;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.chip{background:var(--panel2);border:1px solid var(--line);border-radius:20px;padding:6px 12px;font-size:12px;font-weight:700;color:var(--dim);white-space:nowrap;cursor:pointer}
.chip.on{background:var(--accent);color:#04231a;border-color:var(--accent)}
.row{display:flex;align-items:center;gap:10px;padding:11px 14px;border-bottom:1px solid var(--line);background:var(--panel)}
.row:active{background:var(--panel2)}
.rk{font-family:'Bebas Neue';font-size:18px;color:var(--dim);width:34px;text-align:center;flex:none}
.pinfo{flex:1;min-width:0}
.pname{font-weight:700;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:6px}
.star{color:var(--accent2);font-size:11px;flex:none}
.pmeta{font-size:12px;color:var(--dim);margin-top:1px}
.poss{display:flex;gap:3px;flex:none}
.pos{font-size:10px;font-weight:800;padding:2px 5px;border-radius:4px;letter-spacing:.5px}
.pos.GK{background:rgba(255,138,61,.18);color:var(--gk)}
.pos.CB,.pos.RB,.pos.LB{background:rgba(61,165,255,.16);color:var(--def)}
.pos.CM,.pos.CAM{background:rgba(0,214,143,.16);color:var(--mid)}
.pos.W,.pos.ST{background:rgba(255,93,115,.16);color:var(--fwd)}
.btn{background:var(--accent);color:#04231a;border:none;border-radius:8px;padding:9px 14px;font-weight:800;font-size:13px;font-family:inherit;cursor:pointer;flex:none}
.btn:disabled{background:var(--panel2);color:var(--dim);cursor:default}
.btn.sm{padding:7px 10px;font-size:12px}
.teamhdr{padding:12px 14px;background:var(--panel2);border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
.teamhdr .nm{font-family:'Bebas Neue';font-size:22px;letter-spacing:1px}
.needs{font-size:11px;color:var(--dim);font-weight:700}
.needs b{color:var(--accent2)}
.empty{padding:40px 20px;text-align:center;color:var(--dim);font-size:14px}
.grp{padding:8px 14px 4px;font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--dim);font-weight:800;background:var(--bg)}
.boardgrid{padding:10px;overflow-x:auto}
.bg-row{display:flex;gap:6px;margin-bottom:6px}
.bg-cell{flex:none;width:118px;background:var(--panel);border:1px solid var(--line);border-radius:7px;padding:7px 8px;font-size:11px}
.bg-cell .bn{font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:12px}
.bg-cell .bc{color:var(--dim);font-size:10px}
.rdlbl{font-size:10px;color:var(--dim);font-weight:800;width:36px;flex:none;padding:4px;display:flex;align-items:center}
.setup{padding:24px 18px;max-width:440px;margin:0 auto}
.setup h2{font-family:'Bebas Neue';font-size:26px;letter-spacing:1px;margin-bottom:4px}
.setup p{color:var(--dim);font-size:13px;margin-bottom:16px;line-height:1.5}
.setup label{font-size:12px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;display:block;margin:14px 0 6px}
.setup input{width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:11px 12px;color:var(--txt);font-size:15px;font-family:inherit}
.namegrid{display:flex;flex-direction:column;gap:8px}
.row2{display:flex;gap:8px;align-items:center}
.row2 input{flex:1}
.toggle{display:flex;align-items:center;gap:8px;margin-top:14px;font-size:13px;color:var(--dim)}
.toggle input{width:auto}
.big{width:100%;margin-top:20px;padding:14px;font-size:15px}
.pickme{display:flex;flex-direction:column;gap:8px;margin-top:8px}
.pickme button{background:var(--panel2);border:1px solid var(--line);color:var(--txt);border-radius:10px;padding:13px;font-size:15px;font-weight:700;font-family:inherit;text-align:left;cursor:pointer;display:flex;justify-content:space-between}
.pickme button:active{border-color:var(--accent)}
.pickme .adminbadge{color:var(--accent2);font-size:11px}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--accent);color:#04231a;padding:10px 18px;border-radius:24px;font-weight:800;font-size:13px;z-index:100;opacity:0;transition:opacity .2s;pointer-events:none}
.toast.show{opacity:1}
.note{padding:10px 14px;font-size:11px;color:var(--dim);text-align:center;line-height:1.5}
.reset{display:block;margin:18px auto;background:none;border:1px solid var(--line);color:var(--dim);border-radius:8px;padding:8px 16px;font-size:12px;font-family:inherit;cursor:pointer}
.adminbar{background:rgba(255,210,63,.08);border:1px solid rgba(255,210,63,.3);border-radius:8px;margin:8px 12px;padding:8px 12px;font-size:12px;color:var(--accent2);display:flex;justify-content:space-between;align-items:center}
.adminbar button{background:var(--accent2);color:#231c04;border:none;border-radius:6px;padding:6px 10px;font-weight:800;font-size:11px;font-family:inherit;cursor:pointer}
</style>

<script>
const SQUAD=18,NMGR=8,MINS={GK:2,DEF:5,CM:2,ST:2},DEFTAGS=['CB','RB','LB'];
const POSFILTERS=['ALL','XI','GK','CB','RB','LB','CM','CAM','W','ST'];
let STATE=null,ME=null,ADMIN=false,TAB='players',POS='ALL',Q='',localTimer=null,timerVal=null,timerPaused=false;
async function load(){try{const snap=await firebase.database().ref('wcdraft').once('value');return snap.val();}catch(e){return null;}}
async function save(){try{await firebase.database().ref('wcdraft').set(STATE);}catch(e){}}
function snakeOrder(){const o=[];for(let r=0;r<SQUAD;r++){const s=[...Array(NMGR).keys()];o.push(...(r%2?s.reverse():s));}return o;}
const ORD=snakeOrder();
function catCounts(ids){const c={GK:0,DEF:0,CM:0,ST:0};ids.forEach(id=>{const p=PLAYERS[id];if(p.p.includes('GK'))c.GK++;if(p.p.some(x=>DEFTAGS.includes(x)))c.DEF++;if(p.p.includes('CM'))c.CM++;if(p.p.includes('ST'))c.ST++;});return c;}
function unmet(ids){const c=catCounts(ids);return Object.keys(MINS).reduce((s,k)=>s+Math.max(0,MINS[k]-c[k]),0);}
function curIdx(){return STATE.picks.length;}
function onClock(){return ORD[curIdx()];}
function done(){return curIdx()>=ORD.length;}
function teamIds(m){return STATE.picks.filter(p=>p.mgr===m).map(p=>p.id);}
function needStr(ids){const c=catCounts(ids);return Object.keys(MINS).filter(k=>c[k]<MINS[k]).map(k=>(MINS[k]-c[k])+k).join(' ');}
function bestAvail(forMgr){const taken={};STATE.picks.forEach(p=>taken[p.id]=1);
  const ids=teamIds(forMgr);const left=SQUAD-ids.length-1;
  for(const p of PLAYERS){if(taken[p.id])continue;if(unmet([...ids,p.id])>left)continue;return p.id;}
  // if all blocked by mins, just take best available
  for(const p of PLAYERS){if(!taken[p.id])return p.id;}return null;}
async function draftId(id,bySeat){
  STATE=await load();
  const seat=bySeat!==undefined?bySeat:ME;
  if(onClock()!==seat){toast("Not that team's pick");render();return;}
  if(STATE.picks.find(p=>p.id===id)){toast("Already drafted");render();return;}
  const ids=teamIds(seat);const left=SQUAD-ids.length-1;
  if(unmet([...ids,id])>left){toast("Blocked: that team needs "+needStr(ids));render();return;}
  STATE.picks.push({id,mgr:seat,pickNo:STATE.picks.length+1,t:Date.now()});
  await save();toast(PLAYERS[id].n+" → "+STATE.names[seat]);render();
}
async function autopick(){const seat=onClock();const id=bestAvail(seat);if(id!=null)await draftId(id,seat);}
function el(){}
function posTags(p){return '<div class="poss">'+p.map(x=>'<span class="pos '+x+'">'+x+'</span>').join('')+'</div>';}
function render(){
  const app=document.getElementById('app');
  if(!STATE){app.innerHTML=setupView();return;}
  if(ME===null){app.innerHTML=pickSeatView();return;}
  let h=headerView()+tabsView();
  if(ADMIN&&!done()&&onClock()!==ME)h+=`<div class="adminbar"><span>Admin: ${STATE.names[onClock()]} is on the clock</span><button onclick="autopick()">Auto-pick for them</button><button onclick="toggleTimer()" style="margin-left:6px">${timerPaused?"▶ Resume":"⏸ Pause"} Timer</button></div>`;
  if(TAB==='players')h+=playersView();else if(TAB==='team')h+=teamView();else h+=boardView();
  app.innerHTML=h;
}
function headerView(){const oc=onClock(),dn=done(),mine=oc===ME&&!dn,rd=Math.floor(curIdx()/NMGR)+1;
  let tcls='timer',tdisp='';
  if(!dn&&STATE.timer){const sec=timerVal==null?STATE.timer:timerVal;tdisp=sec;if(sec<=10)tcls+=' danger';else if(sec<=20)tcls+=' warn';}
  return `<header><div class="title">WORLD CUP <span>DRAFT</span></div>
    <div class="sub">${STATE.names[ME]}${ADMIN?' · admin':''} · ${teamIds(ME).length}/${SQUAD}</div>
    <div class="onclock ${mine?'mine':''}">
      <div><div class="lbl">${dn?'Draft Complete':'On the clock'}</div><div class="who">${dn?'—':STATE.names[oc]}</div></div>
      <div style="display:flex;align-items:center;gap:12px">
        ${(!dn&&STATE.timer)?`<div class="${tcls}">${tdisp}</div>`:''}
        <div style="text-align:right"><div class="pick">${dn?'':'Round '+rd}</div><div class="lbl">Pick ${Math.min(curIdx()+1,ORD.length)}/${ORD.length}</div></div>
      </div></div></header>`;
}
function tabsView(){const t=[['players','Players'],['team','My Team'],['board','Board']];
  return '<div class="tabs">'+t.map(([k,l])=>`<div class="tab ${TAB===k?'active':''}" onclick="setTab('${k}')">${l}</div>`).join('')+'</div>';}
function playersView(){
  const taken={};STATE.picks.forEach(p=>taken[p.id]=1);
  let list=PLAYERS.filter(p=>!taken[p.id]);
  if(POS==='XI')list=list.filter(p=>p.s);else if(POS!=='ALL')list=list.filter(p=>p.p.includes(POS));
  if(Q)list=list.filter(p=>p.n.toLowerCase().includes(Q)||p.c.toLowerCase().includes(Q));
  list=list.slice(0,300);
  const canPick=(!done()&&onClock()===ME);
  let h=`<div class="toolbar"><input class="search" placeholder="Search player or country" value="${Q}" oninput="setQ(this.value)"></div><div class="filters">`+POSFILTERS.map(f=>`<div class="chip ${POS===f?'on':''}" onclick="setPos('${f}')">${f==='XI'?'★ Starters':f}</div>`).join('')+`</div>`;
  if(!list.length)h+='<div class="empty">No players match.</div>';
  list.forEach(p=>{h+=`<div class="row"><div class="rk">${p.rank}</div>
    <div class="pinfo"><div class="pname">${p.n}${p.s?'<span class="star">★</span>':''}</div><div class="pmeta">${p.c}</div></div>
    ${posTags(p.p)}<button class="btn sm" ${canPick?'':'disabled'} onclick="draftId(${p.id})">Draft</button></div>`;});
  if(!canPick)h+='<div class="note">★ = projected starter. Draft activates on your pick'+(ADMIN?', or use the admin bar to pick for whoever is on the clock.':'.')+'</div>';
  return h;
}
function teamView(){const ids=teamIds(ME),c=catCounts(ids),order=['GK','CB','RB','LB','CM','CAM','W','ST'];
  const need=Object.keys(MINS).filter(k=>c[k]<MINS[k]).map(k=>`<b>${MINS[k]-c[k]} ${k}</b>`).join(', ');
  let h=`<div class="teamhdr"><div class="nm">${STATE.names[ME]}</div><div class="needs">${ids.length}/${SQUAD} · ${need?'need '+need:'minimums met'}</div></div>`;
  if(!ids.length)return h+'<div class="empty">No players yet.</div>';
  const byPos={};ids.forEach(id=>{const p=PLAYERS[id];(byPos[p.p[0]]=byPos[p.p[0]]||[]).push(p);});
  order.forEach(k=>{if(!byPos[k])return;h+=`<div class="grp">${k}</div>`;byPos[k].forEach(p=>{h+=`<div class="row"><div class="rk">${p.rank}</div><div class="pinfo"><div class="pname">${p.n}${p.s?'<span class="star">★</span>':''}</div><div class="pmeta">${p.c}</div></div>${posTags(p.p)}</div>`;});});
  return h;}
function boardView(){let h='<div class="boardgrid">';
  h+='<div class="bg-row"><div class="rdlbl"></div>'+STATE.names.map(n=>`<div class="bg-cell" style="text-align:center;color:var(--accent);font-family:Bebas Neue;font-size:13px">${n}</div>`).join('')+'</div>';
  for(let r=0;r<SQUAD;r++){h+=`<div class="bg-row"><div class="rdlbl">R${r+1}</div>`;
    for(let seat=0;seat<NMGR;seat++){const gi=r*NMGR+(r%2?(NMGR-1-seat):seat);const pk=STATE.picks[gi];
      if(pk){const p=PLAYERS[pk.id];h+=`<div class="bg-cell"><div class="bn">${p.n}</div><div class="bc">${p.c} · ${p.p.join('/')}</div></div>`;}
      else h+=`<div class="bg-cell" style="opacity:.35"><div class="bc">—</div></div>`;}
    h+='</div>';}
  return h+'</div>';}
function setupView(){return `<div class="setup"><h2>Set Up The Draft</h2>
  <p>One person sets this up, then shares this same link with everyone. Enter all 8 team names in draft order (pick 1 first).</p>
  <div class="namegrid">`+[...Array(NMGR)].map((_,i)=>`<div><label>Pick ${i+1}</label><input id="nm${i}" placeholder="Team ${i+1}"></div>`).join('')+`</div>
  <label>Pick timer (seconds, 0 = off)</label><input id="timer" type="number" value="90">
  <button class="btn big" onclick="startDraft()">Start Draft</button></div>`;}
function pickSeatView(){return `<div class="setup"><h2>Who Are You?</h2><p>Tap your team. You only draft on your turn. One person should take Admin to run the clock and pick for anyone who is away.</p>
  <div class="pickme">`+STATE.names.map((n,i)=>`<button onclick="setMe(${i},false)">${n}<span></span></button>`).join('')+
  `<button onclick="setMe(0,true)">Run as Admin <span class="adminbadge">commissioner</span></button></div>
  <button class="reset" onclick="resetDraft()">Reset entire draft</button></div>`;}
window.setTab=k=>{TAB=k;render();};window.setPos=p=>{POS=p;render();};window.setQ=v=>{Q=v.toLowerCase();render();};
window.setMe=(i,admin)=>{ME=i;ADMIN=admin;localStorage.setItem('wc_me',i);localStorage.setItem('wc_admin',admin?'1':'');render();};
window.draftId=draftId;window.autopick=autopick;
window.toggleTimer=()=>{timerPaused=!timerPaused;render();};
window.startDraft=async()=>{const names=[...Array(NMGR)].map((_,i)=>document.getElementById('nm'+i).value.trim()||('Team '+(i+1)));
  const t=parseInt(document.getElementById('timer').value)||0;STATE={names,picks:[],timer:t,created:Date.now()};await save();render();};
window.resetDraft=async()=>{if(!confirm('Wipe the entire draft for everyone?'))return;STATE=null;ME=null;ADMIN=false;localStorage.clear();try{await firebase.database().ref('wcdraft').remove();}catch(e){}render();};
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(window._tt);window._tt=setTimeout(()=>t.classList.remove('show'),1600);}
let lastPickCount=-1,lastSeat=-1;
async function tick(){const s=await load();
  if(s){const changed=!STATE||STATE.picks.length!==s.picks.length;STATE=s;
    const sm=localStorage.getItem('wc_me');if(sm!==null&&ME===null)ME=+sm;
    if(localStorage.getItem('wc_admin'))ADMIN=true;
    // reset timer when the pick or seat changes
    if(STATE.picks.length!==lastPickCount||onClock()!==lastSeat){lastPickCount=STATE.picks.length;lastSeat=onClock();timerVal=STATE.timer;}
    if(changed)render();}
  else if(STATE&&!s){STATE=null;render();}}
function timerLoop(){if(STATE&&STATE.timer&&!done()&&!timerPaused){if(timerVal==null)timerVal=STATE.timer;
  if(timerVal>0){timerVal--;const t=document.querySelector('.timer');if(t){t.textContent=timerVal;t.className='timer'+(timerVal<=10?' danger':timerVal<=20?' warn':'');}}
  else{const t=document.querySelector('.timer');if(t){t.textContent='0';t.className='timer danger';}
    if(ADMIN){autopick();}}}}
(async function(){
  const sm=localStorage.getItem('wc_me');
  if(localStorage.getItem('wc_admin'))ADMIN=true;
  render(); // show setup screen immediately while Firebase connects
  // Firebase real-time listener: all clients update instantly on any pick
  firebase.database().ref('wcdraft').on('value',snap=>{
    const s=snap.val();
    if(!s){if(STATE){STATE=null;render();}return;}
    const changed=!STATE||JSON.stringify(STATE.picks)!==JSON.stringify(s.picks)||(STATE.picks&&STATE.picks.length!==s.picks.length);
    STATE=s;
    if(ME===null&&sm!==null)ME=+sm;
    if(changed){
      if(STATE.picks.length!==lastPickCount||onClock()!==lastSeat){
        lastPickCount=STATE.picks.length;lastSeat=onClock();timerVal=STATE.timer||null;
      }
      render();
    }
  });
  setInterval(timerLoop,1000);
})();
</script>
</body>
</html>
