header{background:linear-gradient(135deg,#0d1420,#161f30);border-bottom:1px solid var(--line);padding:14px 16px;position:sticky;top:0;z-index:50}

/* Toast */

function getNextFixture(country){
  if(!country) return null;
  const today = new Date();
  for(const [home,away,md,date,time] of WC_SCHEDULE){
    if(home===country||away===country){
      const opp = home===country?away:home;
      return {md, date, time, opp, home, away};
    }
  }
  return null;
}

function fixtureStr(country){
  const f = getNextFixture(country);
  if(!f) return '';
  const opp = f.home===country?f.away:f.home;
  return `${country} vs ${opp} · MD${f.md} · ${f.date}`;
}

// ── FORMATIONS ──────────────────────────────────────────────────────────────
// Each group: label shown, how many slots, which position tags are accepted
const FORMATIONS = {
  '4-3-3': [
    {label:'GK', n:1, accepts:['GK']},
    {label:'CB', n:2, accepts:['CB']},
    {label:'FB', n:2, accepts:['RB','LB']},
    {label:'CM', n:3, accepts:['CM']},
    {label:'W',  n:2, accepts:['W']},
    {label:'ST', n:1, accepts:['ST']},
  ],
  '4-2-4': [
    {label:'GK', n:1, accepts:['GK']},
    {label:'CB', n:2, accepts:['CB']},
    {label:'FB', n:2, accepts:['RB','LB']},
    {label:'CM', n:2, accepts:['CM']},
    {label:'W',  n:2, accepts:['W']},
    {label:'ST', n:2, accepts:['ST']},
  ],
  '4-2-3-1': [
    {label:'GK',  n:1, accepts:['GK']},
    {label:'CB',  n:2, accepts:['CB']},
    {label:'FB',  n:2, accepts:['RB','LB']},
    {label:'CM',  n:2, accepts:['CM']},
    {label:'CAM', n:1, accepts:['CAM']},

    {label:'ST',  n:1, accepts:['ST']},
  ],
  '5-2-1-2': [
    {label:'GK',  n:1, accepts:['GK']},
    {label:'CB',  n:3, accepts:['CB']},
    {label:'WB',  n:2, accepts:['RB','LB']},
    {label:'CM',  n:2, accepts:['CM']},
    {label:'CAM', n:1, accepts:['CAM']},
    {label:'ST',  n:2, accepts:['ST']},
  ],
  '5-2-3': [
    {label:'GK', n:1, accepts:['GK']},
    {label:'CB', n:3, accepts:['CB']},
    {label:'WB', n:2, accepts:['RB','LB']},
    {label:'CM', n:2, accepts:['CM']},
    {label:'W',  n:2, accepts:['W']},
    {label:'ST', n:1, accepts:['ST']},
  ],
};

// ── SCORING CATEGORIES ──────────────────────────────────────────────────────
const CATS = [
  {key:'goals',   label:'Goals'},
  {key:'assists', label:'Assists'},
  {key:'passes',  label:'Passes'},
  {key:'rating',  label:'Rating'},
  {key:'takeons', label:'Take-ons'},
  {key:'tackles', label:'Tackles'},
  {key:'cs',      label:'CS'},
  {key:'savepct', label:'Sv%'},
];

// ── GLOBAL STATE ────────────────────────────────────────────────────────────
let PLAYERS_MAP = {}; // id -> player object, loaded from Firebase
let STATE = null;     // draft STATE (names + picks)
let ME = null;
let ADMIN = false;
let TAB = 'team';
let MATCHDAY = 1;
let LINEUPS = {};       // {md: {seat: [playerIds]}}
let FORMATIONS_SEL = {};// {md: {seat: 'formationKey'}}
let LOCKS = {};         // {md: timestamp}
let STATS = {};         // {md: {playerId: statsObj}}

// ── HASH ────────────────────────────────────────────────────────────────────
function simpleHash(s){let h=0;for(let i=0;i<s.length;i++){h=(Math.imul(31,h)+s.charCodeAt(i))|0;}return Math.abs(h).toString(16);}

// ── PLAYER HELPERS ──────────────────────────────────────────────────────────
function getPlayer(id){return PLAYERS_MAP[id]||null;}
function teamIds(seat){
  if(!STATE||!STATE.picks)return[];
  return STATE.picks.filter(p=>p.mgr===seat).map(p=>p.id);
}
function canFill(player, accepts){
  return accepts.some(tag=>player.p.includes(tag));
}
function posTagsHtml(player){
  return player.p.map(t=>`<span class="ptag ${t}">${t}</span>`).join('');
}

// ── FORMATION VALIDATOR ──────────────────────────────────────────────────────
// lineup is array of {group (label), playerId}
function validateLineup(lineup, formKey){
  const fDef = FORMATIONS[formKey];
  if(!fDef) return {ok:false, msg:'Pick a formation'};
  const total = fDef.reduce((s,g)=>s+g.n, 0);
  if(lineup.length !== total) return {ok:false, msg:`Need ${total} players (have ${lineup.length})`};
  for(const {group, playerId} of lineup){
    const g = fDef.find(x=>x.label===group);
    if(!g) return {ok:false, msg:`Unknown slot: ${group}`};
    const p = getPlayer(playerId);
    if(!p) return {ok:false, msg:`Player not found`};
    if(!canFill(p, g.accepts))
      return {ok:false, msg:`${p.n} (${p.p.join('/')}) can't play ${group}`};
  }
  const ids = lineup.map(x=>x.playerId);
  if(new Set(ids).size !== ids.length) return {ok:false, msg:'Duplicate player'};
  return {ok:true, msg:'Lineup valid ✓'};
}

// lineup stored in Firebase: array of {group, playerId}
function getMyLineup(md, seat){
  const raw = LINEUPS[md]&&LINEUPS[md][seat];
  if(!raw) return [];
  // Handle both array and object (Firebase can convert arrays to objects)
  if(Array.isArray(raw)) return raw;
  return Object.values(raw);
}
function getMyFormation(md, seat){
  return (FORMATIONS_SEL[md]&&FORMATIONS_SEL[md][seat])||'4-3-3';
}

// ── SCORING ──────────────────────────────────────────────────────────────────
function computeStandings(){
  const totals = {};
  for(let s=0;s<NMGR;s++){
    totals[s]={};
    CATS.forEach(c=>totals[s][c.key]=0);
  }
  Object.keys(STATS).forEach(md=>{
    const mdStats = STATS[md]||{};
    const mdLineups = LINEUPS[md]||{};
    for(let seat=0;seat<NMGR;seat++){
      const lineup = getMyLineup(md, seat);
      lineup.forEach(({playerId})=>{
        const st = mdStats[playerId];
        if(!st) return;
        const p = getPlayer(playerId);
        totals[seat].goals   += (st.goals||0);
        totals[seat].assists += (st.assists||0);
        totals[seat].passes  += (st.passes||0);
        totals[seat].rating  += parseFloat(st.rating||0);
        totals[seat].takeons += (st.takeons||0);
        totals[seat].tackles += (st.tackles||0);
        if(p&&(p.p.includes('CB')||p.p.includes('RB')||p.p.includes('LB')||p.p.includes('GK'))&&st.cs) totals[seat].cs++;
        if(p&&p.p.includes('GK')&&st.faced>0) totals[seat].savepct += (st.saves/st.faced)*100;
      });
    }
  });
  const pts={};
  const catRanks={}; // seat -> cat -> rank points (8 down to 1)
  for(let s=0;s<NMGR;s++){pts[s]=0;catRanks[s]={};}
  CATS.forEach(cat=>{
    const sorted=[...Array(NMGR).keys()].sort((a,b)=>totals[b][cat.key]-totals[a][cat.key]);
    sorted.forEach((seat,idx)=>{
      const rp=NMGR-idx;
      pts[seat]+=rp;
      catRanks[seat][cat.key]=rp;
    });
  });
  return{totals,pts,catRanks};
}

// ── API-FOOTBALL ─────────────────────────────────────────────────────────────
async function fetchStats(md){
  toast('Fetching stats...');
  try{
    const roundMap={1:'Group Stage - 1',2:'Group Stage - 2',3:'Group Stage - 3',
      4:'Round of 16',5:'Quarter-finals',6:'Semi-finals',7:'3rd Place Final',8:'Final'};
    const round=encodeURIComponent(roundMap[md]||`Group Stage - ${md}`);
    const r=await fetch(`https://v3.football.api-sports.io/fixtures?league=1&season=2026&round=${round}`,
      {headers:{'x-apisports-key':API_KEY}});
    const d=await r.json();
    if(!d.response?.length){toast('No fixtures found');return;}
    const allStats={};
    for(const fix of d.response){
      if(fix.fixture.status.short!=='FT') continue;
      const sr=await fetch(`https://v3.football.api-sports.io/fixtures/players?fixture=${fix.fixture.id}`,
        {headers:{'x-apisports-key':API_KEY}});
      const sd=await sr.json();
      (sd.response||[]).forEach(team=>{
        (team.players||[]).forEach(pp=>{
          const matched=matchName(pp.player.name);
          if(!matched) return;
          const s=pp.statistics[0];
          allStats[matched.id]={
            goals:   s.goals?.total||0,
            assists: s.goals?.assists||0,
            passes:  s.passes?.total||0,
            rating:  parseFloat(s.games?.rating||0),
            takeons: s.dribbles?.success||0,
            tackles: s.tackles?.total||0,
            cs:      (s.games?.minutes>0)&&((s.goals?.conceded||0)===0),
            saves:   s.goals?.saves||0,
            faced:   (s.goals?.saves||0)+(s.goals?.conceded||0),
            minutes: s.games?.minutes||0,
          };
        });
      });
    }
    await db.ref(`wcdraft/stats/${md}`).set(allStats);
    STATS[md]=allStats;
    toast(`Stats saved for MD ${md}`);
    render();
  }catch(e){toast('Error: '+e.message);}
}

function matchName(apiName){
  const norm=s=>s.normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().trim();
  const n=norm(apiName);
  const all=Object.values(PLAYERS_MAP);
  let m=all.find(p=>norm(p.n)===n);
  if(m) return m;
  const last=n.split(' ').pop();
  const cands=all.filter(p=>norm(p.n).endsWith(last));
  if(cands.length===1) return cands[0];
  const parts=n.split(' ');
  if(parts.length>=2){
    const fl=parts[0]+' '+parts[parts.length-1];
    m=all.find(p=>{const pn=norm(p.n).split(' ');return pn[0]+' '+pn[pn.length-1]===fl;});
    if(m) return m;
  }
  return null;
}

// ── TEAM VIEW ─────────────────────────────────────────────────────────────────
function teamView(){
  const ids=teamIds(ME);
  if(!ids.length) return '<div class="empty">Squad not loaded yet. Try refreshing.</div>';
  // Group by primary position category for display
  const order=['GK','CB','RB','LB','CM','CAM','W','ST'];
  const grouped={};
  order.forEach(k=>grouped[k]=[]);
  ids.forEach(id=>{
    const p=getPlayer(id);
    if(!p) return;
    const primary=p.p[0];
    if(grouped[primary]) grouped[primary].push(p);
    else grouped['CM'].push(p); // fallback
  });
  const mdStats=STATS[MATCHDAY]||{};
  let h=`<div style="padding:10px 14px 6px;display:flex;justify-content:space-between;align-items:center;background:var(--panel2);border-bottom:1px solid var(--line)">

    <div style="font-size:12px;color:var(--dim)">${ids.length} players</div>

  order.forEach(pos=>{

    const labels={GK:'Goalkeepers',CB:'Centre Backs',RB:'Right Backs',LB:'Left Backs',CM:'Central Midfielders',CAM:'Attacking Mids',W:'Wingers',ST:'Strikers'};
    h+=`<div class="grp">${labels[pos]||pos}</div>`;
    grouped[pos].forEach(p=>{

      h+=`<div class="row">
        <div class="pinfo">
          <div class="pname">${p.n}${p.s?'<span style="color:var(--accent2);font-size:10px;margin-left:4px">★</span>':''}</div>
          <div class="pmeta">${p.c}</div>
        </div>
        <div class="ptags">${posTagsHtml(p)}</div>
        ${st?`<span class="stat-pill">${st.rating?st.rating.toFixed(1)+' ⭐':st.goals+'g'}</span>`:''}

// ── LINEUP VIEW ───────────────────────────────────────────────────────────────
function lineupView(){
  const locked=LOCKS[MATCHDAY];
  const myLineup=getMyLineup(MATCHDAY,ME);
  const myForm=getMyFormation(MATCHDAY,ME);
  const fDef=FORMATIONS[myForm];
  const ids=teamIds(ME);

  // MD selector
  let h='<div class="md-bar">';
  for(let md=1;md<=8;md++){
    const lk=LOCKS[md];
    const has=LINEUPS[md]&&LINEUPS[md][ME]&&getMyLineup(md,ME).length===11;
    let cls='md-chip';
    if(md===MATCHDAY) cls+=' active';
    else if(lk) cls+=' locked';
    else if(has) cls+=' done';
    h+=`<div class="${cls}" onclick="setMD(${md})">MD ${md}${lk?' 🔒':has?' ✓':''}</div>`;
  }
  h+='</div>';

  if(locked) h+=`<div class="lock-banner">🔒 Matchday ${MATCHDAY} locked — lineups cannot be changed</div>`;

  // Formation selector
  h+=`<div class="form-row">
    <label>Formation</label>
    <select ${locked?'disabled':''} onchange="changeFormation(this.value)">
      ${Object.keys(FORMATIONS).map(f=>`<option ${f===myForm?'selected':''}>${f}</option>`).join('')}
    </select>
  </div>`;

  // Build a map of who is in which slot
  // myLineup is [{group, playerId}]
  const slotMap={}; // "group:idx" -> playerId
  const groupCounts={};
  myLineup.forEach(({group,playerId})=>{
    if(!groupCounts[group]) groupCounts[group]=0;
    slotMap[`${group}:${groupCounts[group]}`]=playerId;
    groupCounts[group]++;
  });

  // Render slots
  h+=`<div class="grp">Starting XI</div>`;
  fDef.forEach(grp=>{
    for(let i=0;i<grp.n;i++){
      const pid=slotMap[`${grp.label}:${i}`];
      const p=pid!=null?getPlayer(pid):null;
      h+=`<div class="slot ${p?'filled':''}" ${locked?'':'onclick="openPicker(\''+grp.label+'\','+i+')"'}>
        <div class="slot-lbl">${grp.label}</div>
        ${p
          ?`<div class="slot-name">${p.n}<span class="slot-country">${p.c}</span></div>
            <div class="ptags">${posTagsHtml(p)}</div>
            ${!locked?`<button class="btn sm ghost" onclick="event.stopPropagation();removeSlot('${grp.label}',${i})">✕</button>`:''}`
          :`<div class="slot-name"><span class="slot-empty">Tap to pick ${grp.label}</span></div>`
        }
      </div>`;
    }
  });

  // Bench
  const startedIds=myLineup.map(x=>x.playerId);
  const bench=ids.filter(id=>!startedIds.includes(id));
  if(bench.length){
    h+=`<div class="grp">Bench</div>`;
    bench.forEach(id=>{
      const p=getPlayer(id);
      if(!p) return;
      h+=`<div class="slot bench">
        <div class="slot-lbl" style="color:var(--dim)">BN</div>
        <div class="slot-name">${p.n}<span class="slot-country">${p.c}</span></div>
        <div class="ptags">${posTagsHtml(p)}</div>
      </div>`;
    });
  }

  if(!locked){
    const val=validateLineup(myLineup,myForm);
    h+=`<div class="save-bar">
      <div class="val-msg ${val.ok?'ok':'err'}">${val.msg}</div>
      <button class="btn big" ${val.ok?'':'disabled'} onclick="saveLineup()">Save Lineup</button>
    </div>`;
  }
  return h;
}

    h+=`<div style="background:var(--panel2);border-bottom:2px solid var(--line);padding:10px 14px;display:flex;justify-content:space-between;align-items:center;margin-top:${seat>0?'12px':'0'}">

      continue;
    }

    // Build slot map
    const slotMap={};
    const groupCounts={};
    lineup.forEach(({group,playerId})=>{
      if(!groupCounts[group]) groupCounts[group]=0;
      if(!slotMap[group]) slotMap[group]=[];
      slotMap[group].push(playerId);
      groupCounts[group]++;
    });

    // Render formation rows
    // Group slots into rows: GK | DEF/FB/WB | CM/CAM | W/ST
    const rows = [];
    fDef.forEach(grp=>{
      const pids = slotMap[grp.label]||[];
      rows.push({label:grp.label, players:pids});
    });

    // Formation card: render each position group as a row
    h+=`<div style="background:var(--panel);padding:4px 0">`;
    rows.forEach(({label,players})=>{
      if(!players.length) return;
      h+=`<div style="display:flex;justify-content:center;gap:6px;padding:6px 10px;flex-wrap:wrap">`;
      players.forEach(pid=>{
        const p = getPlayer(pid);
        if(!p){h+=`<div style="width:80px"></div>`;return;}
        const fix = getNextFixture(p.c);
        const nextGame = fix?`${fix.opp} · MD${fix.md} · ${fix.date}`:'';
        // Position color
        const posColors = {GK:'var(--gk)',CB:'var(--def)',RB:'var(--def)',LB:'var(--def)',
          CM:'var(--mid)',CAM:'var(--mid)',W:'var(--fwd)',ST:'var(--fwd)',WB:'var(--def)',FB:'var(--def)'};
        const col = posColors[label]||'var(--dim)';
        h+=`<div style="width:90px;text-align:center;padding:6px 4px">
          <div style="width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.06);border:2px solid ${col};display:flex;align-items:center;justify-content:center;margin:0 auto 4px;font-size:9px;font-weight:800;color:${col}">${label}</div>
          <div style="font-size:11px;font-weight:700;line-height:1.3;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.n.split(' ').pop()}</div>
          <div style="font-size:9px;color:var(--dim);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.c}</div>
          ${nextGame?`<div style="font-size:9px;color:var(--accent2);margin-top:2px;line-height:1.3">${nextGame}</div>`:''}
        </div>`;
      });
      h+=`</div>`;
    });

    // Bench row
    const startedIds = lineup.map(x=>x.playerId);
    const allIds = teamIds(seat);
    const bench = allIds.filter(id=>!startedIds.includes(id));
    if(bench.length){
      h+=`<div style="padding:6px 14px 8px;border-top:1px solid var(--line);margin-top:4px">
        <div style="font-size:10px;color:var(--dim);font-weight:800;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">Bench</div>
        <div style="display:flex;flex-wrap:wrap;gap:4px">`;
      bench.forEach(id=>{
        const p=getPlayer(id);
        if(!p) return;
        h+=`<span style="font-size:11px;background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:3px 8px;color:var(--dim)">${p.n.split(' ').pop()}</span>`;
      });
      h+=`</div></div>`;
    }
    h+=`</div>`;
  }
  return h||'<div class="empty">No lineups submitted yet for MD '+MATCHDAY+'</div>';
}

// ── PICKER MODAL ──────────────────────────────────────────────────────────────
function openPicker(group, idx){
  const fDef=FORMATIONS[getMyFormation(MATCHDAY,ME)];
  const grp=fDef.find(g=>g.label===group);
  if(!grp) return;
  const ids=teamIds(ME);
  const myLineup=getMyLineup(MATCHDAY,ME);
  const startedIds=myLineup.map(x=>x.playerId);
  const eligible=ids.filter(id=>{
    const p=getPlayer(id);
    if(!p) return false;
    if(!canFill(p,grp.accepts)) return false;
    // Already in lineup in a different slot? block unless it's this exact slot
    const inSlot=myLineup.find(x=>x.group===group&&myLineup.indexOf(x)===idx);
    if(startedIds.includes(id)&&(!inSlot||inSlot.playerId!==id)) return false;
    return true;
  });
  let m=`<div class="modal-bg" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <div class="modal-hdr">
        <h3>Pick ${group}</h3>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>`;
  if(!eligible.length){
    m+=`<div class="empty">No eligible players for ${group}.<br><span style="font-size:12px">Accepts: ${grp.accepts.join(', ')}</span></div>`;
  } else {
    eligible.forEach(id=>{
      const p=getPlayer(id);
      m+=`<div class="row" style="cursor:pointer" onclick="pickPlayer('${group}',${idx},${id})">
        <div class="pinfo"><div class="pname">${p.n}</div><div class="pmeta">${p.c}</div></div>
        <div class="ptags">${posTagsHtml(p)}</div>
      </div>`;
    });
  }
  m+='</div></div>';
  document.getElementById('modal').innerHTML=m;
}

function pickPlayer(group, idx, playerId){
  closeModal();
  let lineup=getMyLineup(MATCHDAY,ME).filter(x=>!(x.group===group&&getMyLineup(MATCHDAY,ME).indexOf(x)===idx));
  // Remove this player from any other slot
  lineup=lineup.filter(x=>x.playerId!==playerId);
  // Insert at correct group position
  const before=lineup.filter(x=>x.group===group).slice(0,idx);
  const after=lineup.filter(x=>x.group===group).slice(idx);
  const others=lineup.filter(x=>x.group!==group);
  // Rebuild preserving order: others + before + new + after (by group)
  // Simpler: just add the pick and let the render sort it
  lineup.push({group,playerId});
  if(!LINEUPS[MATCHDAY]) LINEUPS[MATCHDAY]={};
  LINEUPS[MATCHDAY][ME]=lineup;
  render();
}

function removeSlot(group, idx){
  let lineup=getMyLineup(MATCHDAY,ME);
  // Find the idx-th occurrence of this group and remove it
  let count=0;
  lineup=lineup.filter(x=>{
    if(x.group!==group) return true;
    if(count===idx){count++;return false;}
    count++;return true;
  });
  if(!LINEUPS[MATCHDAY]) LINEUPS[MATCHDAY]={};
  LINEUPS[MATCHDAY][ME]=lineup;
  render();
}

function changeFormation(val){
  if(!FORMATIONS_SEL[MATCHDAY]) FORMATIONS_SEL[MATCHDAY]={};
  FORMATIONS_SEL[MATCHDAY][ME]=val;
  // Clear lineup on formation change
  if(!LINEUPS[MATCHDAY]) LINEUPS[MATCHDAY]={};
  LINEUPS[MATCHDAY][ME]=[];
  render();
}

async function saveLineup(){
  const lineup=getMyLineup(MATCHDAY,ME);
  const form=getMyFormation(MATCHDAY,ME);
  const val=validateLineup(lineup,form);
  if(!val.ok){toast(val.msg);return;}
  await db.ref(`wcdraft/lineups/${MATCHDAY}/${ME}`).set(lineup);
  await db.ref(`wcdraft/formations/${MATCHDAY}/${ME}`).set(form);
  toast('Lineup saved!');
}

async function lockMD(){
  if(!confirm(`Lock Matchday ${MATCHDAY}? No lineup changes after this.`)) return;
  await db.ref(`wcdraft/locks/${MATCHDAY}`).set(Date.now());
  LOCKS[MATCHDAY]=Date.now();
  toast(`MD ${MATCHDAY} locked`);render();
}
async function unlockMD(){
  await db.ref(`wcdraft/locks/${MATCHDAY}`).remove();
  delete LOCKS[MATCHDAY];
  toast(`MD ${MATCHDAY} unlocked`);render();
}

// ── LOAD ──────────────────────────────────────────────────────────────────────
async function loadAndRender(){
  toast('Loading...');
  // Load draft STATE
  const dsnap=await db.ref('wcdraft').once('value');
  const ds=dsnap.val();
  if(!ds||!ds.names){toast('No draft data found');render();return;}
  if(!ds.picks) ds.picks=[];
  STATE=ds;
  // Load player data
  const psnap=await db.ref('wcdraft/playerdata').once('value');
  const pd=psnap.val();
  if(pd){
    PLAYERS_MAP={};
    Object.values(pd).forEach(p=>{PLAYERS_MAP[p.id]=p;});
  } else {
    toast('Player data missing — ask admin to push players');
  }
  // Load season data
  const [lsnap,fsnap,lksnap,ssnap]=await Promise.all([
    db.ref('wcdraft/lineups').once('value'),
    db.ref('wcdraft/formations').once('value'),
    db.ref('wcdraft/locks').once('value'),
    db.ref('wcdraft/stats').once('value'),
  ]);
  LINEUPS=lsnap.val()||{};
  FORMATIONS_SEL=fsnap.val()||{};
  LOCKS=lksnap.val()||{};
  STATS=ssnap.val()||{};
  // Live listeners
  db.ref('wcdraft/lineups').on('value',s=>{LINEUPS=s.val()||{};render();});
  db.ref('wcdraft/formations').on('value',s=>{FORMATIONS_SEL=s.val()||{};render();});
  db.ref('wcdraft/locks').on('value',s=>{LOCKS=s.val()||{};render();});
  db.ref('wcdraft/stats').on('value',s=>{STATS=s.val()||{};render();});
  render();
}

// ── TOAST ─────────────────────────────────────────────────────────────────────
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(window._tt);window._tt=setTimeout(()=>t.classList.remove('show'),2200);}

// ── GLOBALS ───────────────────────────────────────────────────────────────────
window.setTab=setTab;window.setMD=setMD;window.setMe=setMe;window.changeSeat=changeSeat;window.setStandingsMode=setStandingsMode;
window.tryAdmin=tryAdmin;window.joinPlayer=joinPlayer;window.promptAdmin=promptAdmin;
window.openPicker=openPicker;window.pickPlayer=pickPlayer;window.removeSlot=removeSlot;
window.changeFormation=changeFormation;window.saveLineup=saveLineup;
window.lockMD=lockMD;window.unlockMD=unlockMD;window.fetchStats=fetchStats;
window.closeModal=closeModal;

render(); // show setup screen immediately
</script>
